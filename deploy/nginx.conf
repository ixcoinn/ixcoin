# IXCoin AI Life Layer — Nginx Configuration
# Place in: /etc/nginx/sites-available/ixcoin
# Enable: ln -sf /etc/nginx/sites-available/ixcoin /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_VPS_IP;

    # Redirect HTTP -> HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    # API Server proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # CORS headers
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
    }

    # Security headers
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy           strict-origin-when-cross-origin;
}

