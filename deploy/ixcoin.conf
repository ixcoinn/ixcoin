# ixcoin.conf — IXCoin Node Configuration
# Place in: ~/.ixcoin/ixcoin.conf
# This file configures your ixcoind node on the VPS

# ─── Network ────────────────────────────────────────────────
server=1
daemon=1
listen=1

# ─── RPC (for AI Life Layer connection) ─────────────────────
rpcuser=ixcoinrpc
rpcpassword=REPLACE_WITH_STRONG_PASSWORD_HERE
rpcport=8332
rpcbind=127.0.0.1
rpcallowip=127.0.0.1

# ─── Peers ──────────────────────────────────────────────────
# addnode=seed1.ixcoin.io
# addnode=seed2.ixcoin.io

# ─── Performance ────────────────────────────────────────────
dbcache=512
maxconnections=32
txindex=1

# ─── Logging ────────────────────────────────────────────────
debug=0
printtoconsole=0
