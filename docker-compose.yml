version: "3.9"

# IXCoin P2P AI Network — Multi-node Docker Setup
# Jalankan: docker-compose up --build

services:
  ai-node-1:
    build:
      context: ./ai-layer
      dockerfile: ../Dockerfile.ai-layer
    container_name: ixcoin-ai-node-1
    ports:
      - "8080:8080"
      - "9080:9080"
    environment:
      PORT: "8080"
      NODE_TYPE: "AI_NODE"
      P2P_PORT: "9080"
      NODE_ID: "ai-node-1"
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    restart: unless-stopped

  validator-node-1:
    build:
      context: ./ai-layer
      dockerfile: ../Dockerfile.ai-layer
    container_name: ixcoin-validator-1
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      PORT: "8081"
      NODE_TYPE: "VALIDATOR_NODE"
      P2P_PORT: "9081"
      NODE_ID: "validator-1"
      INITIAL_PEERS: "ws://ai-node-1:9080"
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      - ai-node-1
    restart: unless-stopped

  ai-node-2:
    build:
      context: ./ai-layer
      dockerfile: ../Dockerfile.ai-layer
    container_name: ixcoin-ai-node-2
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      PORT: "8082"
      NODE_TYPE: "AI_NODE"
      P2P_PORT: "9082"
      NODE_ID: "ai-node-2"
      INITIAL_PEERS: "ws://ai-node-1:9080,ws://validator-1:9081"
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      - ai-node-1
    restart: unless-stopped
